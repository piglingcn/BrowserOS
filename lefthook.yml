commit-msg:
  commands:
    conventional:
      run: bun packages/browseros-agent/scripts/check-commit-message.ts {1}

pre-commit:
  commands:
    biome-check:
      root: "packages/browseros-agent/"
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bunx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

    file-length:
      root: "packages/browseros-agent/"
      glob: "*.{ts,tsx}"
      exclude: "*.{test,spec,d}.ts|*.{test,spec}.tsx|**/__tests__/**|**/tests/**|**/*.generated.*"
      run: bun scripts/check-file-length.ts {staged_files}

pre-push:
  commands:
    branch-name:
      run: bun packages/browseros-agent/scripts/check-branch-name.ts
