<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browserclaw</title>
    <!-- Pre-applies the stored theme before React renders to avoid a
         theme flash. Must stay type="module": Vite extracts it into a
         chunk, which MV3's no-inline-script CSP requires. -->
    <script type="module">
      import { getStoredTheme, resolveTheme } from '@/lib/theme/theme-storage'

      const resolved = resolveTheme(getStoredTheme())
      document.documentElement.classList.remove('light', 'dark')
      document.documentElement.classList.add(resolved)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
