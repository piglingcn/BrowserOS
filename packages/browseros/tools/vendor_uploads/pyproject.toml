[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "vendor-uploads"
version = "0.1.0"
description = "Upload third-party vendor binaries (lima, bun, codex, claude-code) to R2"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.12.0",
  "requests>=2.25.1",
  "boto3>=1.34.0",
  "python-dotenv>=1.0.0",
]

[project.scripts]
vendor-upload = "vendor_uploads.main:app"

[tool.setuptools.packages.find]
include = ["vendor_uploads*"]
