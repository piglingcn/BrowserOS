# Required secrets for resource publishing: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
# R2_SECRET_ACCESS_KEY, R2_BUCKET. Optional when publish_ota is true:
# SPARKLE_PRIVATE_KEY.
name: "Release: BrowserClaw Server + Onboard"

on:
  push:
    tags:
      - "claw-server/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.3"
        required: true
        type: string
      ref:
        description: "Git ref to release; defaults to the repository default branch"
        required: false
        type: string
        default: ""
      publish_ota:
        description: "Publish alpha-channel BrowserClaw server OTA artifacts after R2 upload"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: "Release version; defaults to apps/claw-server/package.json at ref"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to release; defaults to the repository default branch"
        required: false
        type: string
        default: ""
      publish_ota:
        description: "Publish alpha-channel BrowserClaw server OTA artifacts after R2 upload"
        required: false
        type: boolean
        default: false
    secrets:
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_BUCKET:
        required: true
      SPARKLE_PRIVATE_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-claw-server
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && (github.event.repository.default_branch || 'main') || (inputs.ref || github.event.repository.default_branch || 'main') }}

      - name: Resolve release
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          packages/browseros-agent/scripts/release/prepare-claw-server-release.sh \
            --event-name "$EVENT_NAME" \
            --default-branch "$DEFAULT_BRANCH" \
            --ref-name "$REF_NAME" \
            --requested-version "$REQUESTED_VERSION" \
            --release-ref HEAD

      - name: Generate release notes
        env:
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "Initial BrowserClaw Server release." > /tmp/release-notes.md
          else
            git log "$PREVIOUS_TAG..$RELEASE_SHA" --pretty=format:"- %s (%h)" > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "No commits since $PREVIOUS_TAG." > /tmp/release-notes.md
            fi
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          TITLE="BrowserClaw Server - v$VERSION"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          fi

          if [ "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = "true" ]; then
            gh release edit "$RELEASE_TAG" --draft=false
          fi

  build-publish:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      PUBLISH_OTA: ${{ inputs.publish_ota || false }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ needs.release.outputs.release_sha }}

      - name: Preflight required secrets
        run: |
          set -euo pipefail
          required=(
            R2_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_BUCKET
          )
          if [ "${PUBLISH_OTA:-false}" = "true" ]; then
            required+=(SPARKLE_PRIVATE_KEY)
          fi

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install Wine for Windows metadata patching
        run: |
          set -euo pipefail
          sudo apt-get update
          # The `wine` package provides the /usr/bin/wine wrapper that
          # patch-windows-exe.ts spawns; ubuntu-24.04's wine64 alone ships
          # only the loader at /usr/lib/wine/wine64 (no /usr/bin entry).
          sudo apt-get install -y --no-install-recommends wine
          if ! command -v wine >/dev/null; then
            sudo ln -s /usr/lib/wine/wine64 /usr/local/bin/wine
          fi
          wine --version

      - name: Install browseros-agent dependencies
        working-directory: packages/browseros-agent
        run: bun ci

      - name: Stamp release version for artifacts
        working-directory: packages/browseros-agent
        run: |
          set -euo pipefail
          python3 - "$VERSION" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          version = sys.argv[1]
          packages = [
            ("apps/claw-server/package.json", "@browseros/claw-server", "apps/claw-server"),
            ("apps/claw-onboard/package.json", "@browseros/claw-onboard", "apps/claw-onboard"),
          ]
          lock_path = Path("bun.lock")
          lock = lock_path.read_text()

          for pkg_file, package_name, workspace in packages:
            pkg_path = Path(pkg_file)
            pkg = json.loads(pkg_path.read_text())
            pkg["version"] = version
            pkg_path.write_text(json.dumps(pkg, indent=2) + "\n")

            escaped_workspace = re.escape(workspace)
            escaped_name = re.escape(package_name)
            pattern = re.compile(rf'("{escaped_workspace}":\s*\{{\s*"name":\s*"{escaped_name}",\s*"version":\s*")([^"]+)(")')
            lock, count = pattern.subn(rf"\g<1>{version}\3", lock)
            if count != 1:
              raise SystemExit(f"Expected exactly one {workspace} version entry in bun.lock, found {count}")

          lock_path.write_text(lock)
          PY

      - name: Publish claw-server resource zips to R2
        working-directory: packages/browseros-agent
        run: R2_UPLOAD_PREFIX=claw-server/prod-resources bun scripts/build/claw-server.ts --target=all --upload

      - name: Publish claw-onboard resources to R2
        working-directory: packages/browseros-agent
        run: R2_UPLOAD_PREFIX=claw-onboard/prod-resources bun scripts/build/claw-onboard.ts --upload

      - name: Attach zips to GitHub release
        working-directory: packages/browseros-agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t server_assets < <(find dist/prod/claw-server -maxdepth 1 -name 'browseros-claw-server-resources-*.zip' | sort)
          onboard_asset="dist/prod/claw-onboard/browseros-claw-onboard-resources.zip"
          if [ "${#server_assets[@]}" -ne 5 ]; then
            echo "::error::Expected 5 claw-server resource zips, found ${#server_assets[@]}"
            printf 'Found asset: %s\n' "${server_assets[@]}"
            exit 1
          fi
          if [ ! -f "$onboard_asset" ]; then
            echo "::error::Missing claw-onboard resource zip: $onboard_asset"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${server_assets[@]}" "$onboard_asset" --clobber

      - name: Summarize published resource keys
        run: |
          set -euo pipefail
          targets=(darwin-arm64 darwin-x64 linux-arm64 linux-x64 windows-x64)
          {
            echo "### BrowserClaw Server resource publish"
            echo
            echo "- Version: \`$VERSION\`"
            echo "- GitHub release: \`$RELEASE_TAG\`"
            echo "- Upload behavior: wrote versioned keys and repointed latest keys"
            echo
            echo "Latest R2 keys:"
            for target in "${targets[@]}"; do
              echo "- \`claw-server/prod-resources/latest/browseros-claw-server-resources-${target}.zip\`"
            done
            echo "- \`claw-onboard/prod-resources/latest/browseros-claw-onboard-resources.zip\`"
            echo
            echo "Versioned R2 keys:"
            for target in "${targets[@]}"; do
              echo "- \`claw-server/prod-resources/${VERSION}/browseros-claw-server-resources-${target}.zip\`"
            done
            echo "- \`claw-onboard/prod-resources/${VERSION}/browseros-claw-onboard-resources.zip\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup uv
        if: ${{ inputs.publish_ota == true }}
        uses: astral-sh/setup-uv@v8.2.0

      - name: Publish alpha BrowserClaw server OTA artifacts
        if: ${{ inputs.publish_ota == true }}
        working-directory: packages/browseros
        run: uv run browseros ota server release --version "$VERSION" --channel alpha --product browserclaw

  reflect-version:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Reflect version on main via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          CLAW_SERVER_PACKAGE_JSON="packages/browseros-agent/apps/claw-server/package.json"
          CLAW_ONBOARD_PACKAGE_JSON="packages/browseros-agent/apps/claw-onboard/package.json"
          LOCK="packages/browseros-agent/bun.lock"
          BRANCH="chore-bump-claw-server-v${VERSION}"

          write_reflection_failure_summary() {
            local status="$1"
            [ "$status" -ne 0 ] || return 0

            echo "::error::BrowserClaw server version reflection failed after release publication; claw-server/v${VERSION} remains published."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### BrowserClaw server version reflection failed"
                echo
                echo "The BrowserClaw Server release for \`claw-server/v${VERSION}\` was already published."
                echo "The follow-up version bump PR failed while using branch \`${BRANCH}\`."
                echo
                echo "Rerun the workflow or create the bump PR manually to sync Claw package versions and \`${LOCK}\`."
              } >> "$GITHUB_STEP_SUMMARY" || true
            fi
          }
          trap 'status=$?; write_reflection_failure_summary "$status"; exit "$status"' EXIT

          create_reflection_pr() {
            gh pr create \
              --title "chore: bump claw server version to ${VERSION}" \
              --body "Automated version bump for BrowserClaw Server v${VERSION}, released from tag claw-server/v${VERSION}. The release is already published; merge this to keep apps/claw-server, apps/claw-onboard, and bun.lock in sync with the released resource zips." \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH"

            gh pr merge "$BRANCH" --squash --auto || true
          }

          git fetch origin "$DEFAULT_BRANCH" --no-tags
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          current_claw_server="$(node -e 'const fs = require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).version)' "$CLAW_SERVER_PACKAGE_JSON")"
          current_claw_onboard="$(node -e 'const fs = require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).version)' "$CLAW_ONBOARD_PACKAGE_JSON")"
          if [ "$current_claw_server" = "$VERSION" ] && [ "$current_claw_onboard" = "$VERSION" ]; then
            echo "Claw packages already at $VERSION; nothing to bump."
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            EXISTING_PR="$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // ""')"
            if [ -n "$EXISTING_PR" ]; then
              echo "Branch $BRANCH already has open bump PR #$EXISTING_PR."
              gh pr merge "$BRANCH" --squash --auto || true
              exit 0
            fi

            echo "Branch $BRANCH already exists without an open bump PR; creating it."
            create_reflection_pr
            exit 0
          fi

          node -e '
          const fs = require("fs");
          const [clawServerPkgPath, clawOnboardPkgPath, lockPath, version] = process.argv.slice(1);
          for (const pkgPath of [clawServerPkgPath, clawOnboardPkgPath]) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
          }
          let lock = fs.readFileSync(lockPath, "utf8");
          const replacements = [
            /("apps\/claw-server":\s*\{\s*"name":\s*"@browseros\/claw-server",\s*"version":\s*")(\d+\.\d+\.\d+)(")/g,
            /("apps\/claw-onboard":\s*\{\s*"name":\s*"@browseros\/claw-onboard",\s*"version":\s*")(\d+\.\d+\.\d+)(")/g,
          ];
          for (const re of replacements) {
            const matches = lock.match(re);
            if (!matches || matches.length !== 1) {
              console.error("Expected exactly one Claw package version entry in bun.lock, found " + (matches ? matches.length : 0));
              process.exit(1);
            }
            lock = lock.replace(re, (match, prefix, _old, suffix) => prefix + version + suffix);
          }
          fs.writeFileSync(lockPath, lock);
          ' "$CLAW_SERVER_PACKAGE_JSON" "$CLAW_ONBOARD_PACKAGE_JSON" "$LOCK" "$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$CLAW_SERVER_PACKAGE_JSON" "$CLAW_ONBOARD_PACKAGE_JSON" "$LOCK"
          git commit -m "chore: bump claw server version to ${VERSION}"
          git push origin "$BRANCH"

          create_reflection_pr
