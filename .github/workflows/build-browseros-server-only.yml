name: "Build: BrowserOS Server Only"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build; defaults to the selected branch"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-server:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: packages/browseros-agent

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch Windows Bun target for CI
        run: |
          (Get-Content packages/build-server-tools/src/targets.ts) `
            -replace 'bun-windows-x64-baseline', 'bun-windows-x64' `
            | Set-Content packages/build-server-tools/src/targets.ts

      - name: Provide zip command on Windows
        shell: powershell
        run: |
          $zipCmd = Join-Path $env:RUNNER_TEMP 'zip.cmd'
          @'
          @echo off
          powershell -NoProfile -ExecutionPolicy Bypass -Command ^
            "param([string[]]$args) ; $dest = $args[0]; $sources = $args[1..($args.Length-1)] | Where-Object { $_ -ne $null -and $_ -ne '' }; if (Test-Path $dest) { Remove-Item $dest -Force }; Compress-Archive -Path $sources -DestinationPath $dest -Force"
          '@ | Set-Content $zipCmd -Encoding ASCII
          "$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build BrowserOS Server
        run: bun scripts/build/server.ts --target=windows-x64 --ci --no-upload

      - name: Upload browseros_server.exe
        uses: actions/upload-artifact@v4
        with:
          name: browseros-server-windows-x64
          path: packages/browseros-agent/dist/prod/server/windows-x64/resources/bin/browseros_server.exe
          if-no-files-found: error

      - name: Upload full server bundle
        uses: actions/upload-artifact@v4
        with:
          name: browseros-server-windows-x64-bundle
          path: packages/browseros-agent/dist/prod/server/windows-x64
          if-no-files-found: error
